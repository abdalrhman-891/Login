<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCast | Premium Login</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #38bdf8;
            --bg: #030712;
            --card-bg: #111827;
            --text-main: #f9fafb;
        }

        /* تنسيق أساسي متجاوب لجميع الشاشات */
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* قسم الدخول */
        .login-section {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin: 60px 0;
            animation: fadeIn 1s ease;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        input {
            width: 100%;
            padding: 18px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 15px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(56, 189, 248, 0.15); }

        .btn-enter {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 900;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        /* حاوية الباقات - تصميم مرن */
        .plans-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
        }

        .plan-card {
            background: var(--card-bg);
            border: 1px solid #1f2937;
            border-radius: 24px;
            padding: 35px;
            width: 320px;
            text-align: center;
            transition: 0.4s ease;
            position: relative;
            box-sizing: border-box;
        }

        .plan-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .featured { border: 2px solid var(--primary); transform: scale(1.05); }

        .plan-price { font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 15px 0; }
        
        .features { list-style: none; padding: 0; text-align: right; margin: 25px 0; }
        .features li { margin-bottom: 10px; font-size: 14px; color: #9ca3af; }
        .features li::before { content: '✓'; color: var(--primary); margin-left: 8px; font-weight: bold; }

        .btn-sub {
            width: 100%;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .plan-card:hover .btn-sub { background: var(--primary); color: #000; }

        /* ميديا كويري للتلفزيون والشاشات الكبيرة */
        @media (min-width: 1600px) {
            body { zoom: 1.3; }
        }

        /* ميديا كويري للموبايل */
        @media (max-width: 600px) {
            .plan-card { width: 100%; }
            .logo { font-size: 2.5rem; }
        }

        /* زر واتساب */
        .wa-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-section">
        <div class="logo">SmartCast</div>
        <input type="text" id="user-code" placeholder="أدخل كود الدخول">
        <button class="btn-enter" onclick="runLogin()">دخول السيرفر</button>
    </div>

    <div class="plans-container">
        <div class="plan-card">
            <h3>اشتراك شهري</h3>
            <div class="plan-price">50 <span>ج.م</span></div>
            <ul class="features">
                <li>جودة Full HD</li>
                <li>جهاز واحد</li>
                <li>دعم فني متاح</li>
            </ul>
            <button class="btn-sub" onclick="toWA('الشهري')">اشتراك في SmartCast</button>
        </div>

        <div class="plan-card featured">
            <h3 style="color: var(--primary);">اشتراك سنوي</h3>
            <div class="plan-price">400 <span>ج.م</span></div>
            <ul class="features">
                <li>جودة 4K فائقة</li>
                <li>جهازين في وقت واحد</li>
                <li>تحديثات حصرية</li>
            </ul>
            <button class="btn-sub" onclick="toWA('السنوي')">اشتراك في SmartCast</button>
        </div>

        <div class="plan-card">
            <h3>مدى الحياة</h3>
            <div class="plan-price">999 <span>ج.م</span></div>
            <ul class="features">
                <li>دفع لمرة واحدة</li>
                <li>4 أجهزة في وقت واحد</li>
                <li>عضوية VIP دائمة</li>
            </ul>
            <button class="btn-sub" onclick="toWA('مدى الحياة')">اشتراك في SmartCast</button>
        </div>
    </div>

    <div class="wa-float" onclick="toWA('استفسار')">
        <div style="background:#25d366; color:white; font-size:10px; padding:3px 10px; border-radius:10px; margin-bottom:5px; font-weight:bold;">للاشتراك</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="60">
    </div>

    <script>
        // إعدادات Firebase من مشروعك SmartCast
        const firebaseConfig = {
            apiKey: "AIzaSyBAmqIzExfgc7ny46z5tdlTpujFY3shAyQ",
            authDomain: "smart-cart-c1dbd.firebaseapp.com",
            projectId: "smart-cart-c1dbd",
            databaseURL: "https://smart-cart-c1dbd-default-rtdb.firebaseio.com",
            storageBucket: "smart-cart-c1dbd.appspot.com",
            messagingSenderId: "777421118167",
            appId: "1:777421118167:web:27f29f4f466b0a886f68ba"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function runLogin() {
            const code = document.getElementById('user-code').value.trim();
            if(!code) return alert("يرجى كتابة الكود");

            db.ref('codes/' + code).once('value').then(snap => {
                if(snap.val() === "active") {
                    localStorage.setItem('auth', 'true');
                    window.location.href = "index.html"; // التحويل التلقائي لصفحة index
                } else {
                    alert("الكود غير صحيح");
                }
            });
        }

        function toWA(plan) {
            const num = "201234567890"; // حط رقمك الحقيقي هنا يا عبد الله
            const msg = encodeURIComponent("أريد الاشتراك في باقة: " + plan);
            window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
