<style>
    .episodes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 15px;
        margin-top: 30px;
        padding: 20px;
        background: var(--card);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.05);
    }
    .episode-item {
        background: #1f2937;
        padding: 15px;
        border-radius: 12px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        border: 1px solid transparent;
    }
    .episode-item:hover {
        background: var(--primary);
        color: black;
        transform: translateY(-5px);
    }
    .active-ep {
        border-color: var(--primary);
        box-shadow: 0 0 15px var(--glow);
    }
</style>

<div class="details-container">
    <div class="info-glass">
        <h1 id="m-title">جاري تحميل المسلسل...</h1>
        <p id="m-desc">اختر الحلقة التي تود مشاهدتها من القائمة أدناه.</p>
        
        <h3 style="margin-top: 25px; color: var(--primary);">الحلقات المتوفرة:</h3>
        <div id="episodes-list" class="episodes-grid">
            </div>
    </div>
</div>

<script>
    // تعديل كود الـ JavaScript عشان يجيب قائمة الحلقات
    function loadSeriesData() {
        const seriesName = "المداح"; // ممكن تخليها ديناميكية لاحقاً
        
        db.ref(`Series/${seriesName}/Season_1`).on('value', (snapshot) => {
            const episodes = snapshot.val();
            const listContainer = document.getElementById('episodes-list');
            listContainer.innerHTML = ""; // تنظيف القائمة

            if (episodes) {
                Object.keys(episodes).forEach((key) => {
                    const ep = episodes[key];
                    const epDiv = document.createElement('div');
                    epDiv.className = "episode-item";
                    epDiv.innerText = "حلقة " + key.replace("Episode_", "");
                    
                    epDiv.onclick = () => {
                        changeEpisode(ep.url, ep.title, ep.description);
                        // تمييز الحلقة الحالية
                        document.querySelectorAll('.episode-item').forEach(el => el.classList.remove('active-ep'));
                        epDiv.classList.add('active-ep');
                    };
                    
                    listContainer.appendChild(epDiv);
                });
            }
        });
    }

    function changeEpisode(url, title, desc) {
        finalUrl = url;
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-desc').innerText = desc;
        
        // إظهار الغطاء مرة تانية عشان المشاهد يدوس Play
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('overlay').style.opacity = '1';
        
        const player = document.getElementById('main-player');
        player.src = url;
        player.load();
    }

    window.onload = () => {
        loadData(); // دالتك القديمة
        loadSeriesData(); // الدالة الجديدة للحلقات
    };
</script>
